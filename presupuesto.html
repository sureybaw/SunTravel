<section id="presupuesto">
    <h2>Solicita tu Presupuesto</h2>
    <form action="#" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required placeholder="123-456-7890">

        <label for="informacion">Solicite más información:</label>
        <textarea id="informacion" name="informacion" rows="5" required placeholder="Escribe aquí lo que deseas consultar..."></textarea>

        <label>
            <input type="checkbox" name="privacidad" required>
            Acepto la <a href="#">Política de privacidad</a>
        </label>

        <button type="submit">Enviar solicitud</button>
    </form>
</section>
